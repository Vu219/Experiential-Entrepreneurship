spring:
  application:
    name: aima-backend

  datasource:
    url: jdbc:h2:mem:aima;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret
            scope: openid,profile,email

server:
  port: 8080

jwt:
  secret: test-secret-key-for-jwt-signing-at-least-256-bits-long!!
  expiration-ms: 86400000
